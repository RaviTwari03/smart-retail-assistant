services:

  postgres:
    image: postgres:15

    environment:
      POSTGRES_DB: smart_retail_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    environment:
      # PostgreSQL - matches the local postgres service above
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smart_retail_db

      # Azure Blob Storage - copy from your Azure App Service env vars
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER:-knowledge-base}

      # OpenAI - required for LLM synthesis in customer support agent
      OPENAI_API_KEY: ${OPENAI_API_KEY}

    depends_on:
      - postgres

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app

    stdin_open: true

    depends_on:
      - backend

volumes:
  postgres_data: