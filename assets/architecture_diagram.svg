<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="1100" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1100" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">Smart Retail Assistant — Architecture</text>
  <text x="450" y="72" text-anchor="middle" font-size="13" fill="#8b949e">Azure App Service · FastAPI · Multi-Agent RAG · ChromaDB · PostgreSQL</text>

  <!-- ── LAYER 1: React Frontend ── -->
  <rect x="300" y="100" width="300" height="54" rx="10" fill="#1f6feb" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">React Frontend</text>
  <text x="450" y="142" text-anchor="middle" font-size="11" fill="#cdd9e5">Dashboard · Chat · Forecast · Inventory</text>

  <!-- Arrow -->
  <line x1="450" y1="154" x2="450" y2="178" stroke="#388bfd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── LAYER 2: Azure App Service ── -->
  <rect x="250" y="178" width="400" height="54" rx="10" fill="#1b4332" stroke="#2ea043" stroke-width="1.5"/>
  <text x="450" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Azure App Service</text>
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="#cdd9e5">Docker Container · smart-assistant-api · Southeast Asia</text>

  <!-- Arrow -->
  <line x1="450" y1="232" x2="450" y2="256" stroke="#2ea043" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── LAYER 3: FastAPI Backend ── -->
  <rect x="250" y="256" width="400" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">FastAPI Backend (main.py)</text>
  <text x="450" y="296" text-anchor="middle" font-size="10" fill="#8b949e">/forecast  /detect-anomaly  /search-documents</text>
  <text x="450" y="314" text-anchor="middle" font-size="10" fill="#8b949e">/customer-support  /retail-assistant  /blob-documents</text>

  <!-- Arrow -->
  <line x1="450" y1="326" x2="450" y2="350" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── LAYER 4: Multi-Agent Orchestrator ── -->
  <rect x="250" y="350" width="400" height="54" rx="10" fill="#21262d" stroke="#6e7681" stroke-width="1.5"/>
  <text x="450" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Multi-Agent Orchestrator</text>
  <text x="450" y="392" text-anchor="middle" font-size="11" fill="#8b949e">Routes queries · Aggregates responses</text>

  <!-- Arrows to 5 agents -->
  <line x1="450" y1="404" x2="450" y2="428" stroke="#6e7681" stroke-width="1.5"/>
  <!-- fan out -->
  <line x1="450" y1="428" x2="100" y2="428" stroke="#6e7681" stroke-width="1.5"/>
  <line x1="450" y1="428" x2="800" y2="428" stroke="#6e7681" stroke-width="1.5"/>
  <!-- verticals to agents -->
  <line x1="100" y1="428" x2="100" y2="452" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="262" y1="428" x2="262" y2="452" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="428" x2="450" y2="452" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="638" y1="428" x2="638" y2="452" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="428" x2="800" y2="452" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── LAYER 5: 5 Agents ── -->
  <!-- Customer Support -->
  <rect x="30" y="452" width="140" height="60" rx="8" fill="#1f2d3d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="100" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#388bfd">Customer Support</text>
  <text x="100" y="490" text-anchor="middle" font-size="10" fill="#8b949e">RAG + LLM</text>
  <text x="100" y="504" text-anchor="middle" font-size="10" fill="#8b949e">GPT-3.5-turbo</text>

  <!-- Inventory -->
  <rect x="192" y="452" width="140" height="60" rx="8" fill="#1f2d3d" stroke="#f78166" stroke-width="1.5"/>
  <text x="262" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#f78166">Inventory Agent</text>
  <text x="262" y="490" text-anchor="middle" font-size="10" fill="#8b949e">Stock Classification</text>
  <text x="262" y="504" text-anchor="middle" font-size="10" fill="#8b949e">Alert / Warning / OK</text>

  <!-- Forecast -->
  <rect x="380" y="452" width="140" height="60" rx="8" fill="#1f2d3d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950">Forecast Agent</text>
  <text x="450" y="490" text-anchor="middle" font-size="10" fill="#8b949e">Prophet Model</text>
  <text x="450" y="504" text-anchor="middle" font-size="10" fill="#8b949e">7-day Prediction</text>

  <!-- Data Analyst -->
  <rect x="568" y="452" width="140" height="60" rx="8" fill="#1f2d3d" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="638" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#d2a8ff">Data Analyst</text>
  <text x="638" y="490" text-anchor="middle" font-size="10" fill="#8b949e">Walmart Dataset</text>
  <text x="638" y="504" text-anchor="middle" font-size="10" fill="#8b949e">Store Insights</text>

  <!-- Document Search -->
  <rect x="730" y="452" width="140" height="60" rx="8" fill="#1f2d3d" stroke="#ffa657" stroke-width="1.5"/>
  <text x="800" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffa657">Doc Search</text>
  <text x="800" y="490" text-anchor="middle" font-size="10" fill="#8b949e">RAG Retrieval</text>
  <text x="800" y="504" text-anchor="middle" font-size="10" fill="#8b949e">Raw Chunks</text>

  <!-- ── RAG PIPELINE ── -->
  <!-- Arrow from Customer Support down to RAG -->
  <line x1="100" y1="512" x2="100" y2="560" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="512" x2="800" y2="560" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="560" x2="800" y2="560" stroke="#6e7681" stroke-width="1"/>
  <line x1="450" y1="560" x2="450" y2="584" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RAG Pipeline box -->
  <rect x="200" y="584" width="500" height="130" rx="10" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="450" y="606" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">RAG Pipeline</text>

  <!-- RAG steps -->
  <rect x="220" y="616" width="130" height="36" rx="6" fill="#0d1117" stroke="#388bfd" stroke-width="1"/>
  <text x="285" y="630" text-anchor="middle" font-size="10" fill="#388bfd">Azure Blob Storage</text>
  <text x="285" y="644" text-anchor="middle" font-size="10" fill="#8b949e">knowledge-base</text>

  <line x1="350" y1="634" x2="370" y2="634" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="370" y="616" width="120" height="36" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="430" y="630" text-anchor="middle" font-size="10" fill="#3fb950">Sentence Transformers</text>
  <text x="430" y="644" text-anchor="middle" font-size="10" fill="#8b949e">all-MiniLM-L6-v2</text>

  <line x1="490" y1="634" x2="510" y2="634" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="616" width="170" height="36" rx="6" fill="#0d1117" stroke="#d2a8ff" stroke-width="1"/>
  <text x="595" y="630" text-anchor="middle" font-size="10" fill="#d2a8ff">ChromaDB Vector Store</text>
  <text x="595" y="644" text-anchor="middle" font-size="10" fill="#8b949e">Similarity Search k=3</text>

  <!-- RAG flow label -->
  <text x="450" y="690" text-anchor="middle" font-size="10" fill="#8b949e">PDF → PyPDFLoader → Chunks (300/50) → Embeddings → Persist → Search</text>

  <!-- Arrow down to data stores -->
  <line x1="450" y1="714" x2="450" y2="738" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── DATA STORES ── -->
  <text x="450" y="760" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b949e">Data Stores</text>

  <!-- PostgreSQL -->
  <rect x="150" y="770" width="220" height="60" rx="8" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="260" y="793" text-anchor="middle" font-size="12" font-weight="bold" fill="#f78166">Azure PostgreSQL</text>
  <text x="260" y="811" text-anchor="middle" font-size="10" fill="#8b949e">ChatHistory · ForecastRecords</text>
  <text x="260" y="825" text-anchor="middle" font-size="10" fill="#8b949e">SQLAlchemy ORM</text>

  <!-- ChromaDB -->
  <rect x="530" y="770" width="220" height="60" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="640" y="793" text-anchor="middle" font-size="12" font-weight="bold" fill="#d2a8ff">ChromaDB</text>
  <text x="640" y="811" text-anchor="middle" font-size="10" fill="#8b949e">Vector Embeddings</text>
  <text x="640" y="825" text-anchor="middle" font-size="10" fill="#8b949e">./vector_db (persisted)</text>

  <!-- ── ML MODELS ── -->
  <line x1="450" y1="830" x2="450" y2="860" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="882" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b949e">ML Models</text>

  <rect x="150" y="890" width="200" height="54" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="250" y="912" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950">Prophet Forecast</text>
  <text x="250" y="930" text-anchor="middle" font-size="10" fill="#8b949e">forecast_model.pkl</text>

  <rect x="380" y="890" width="200" height="54" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="480" y="912" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffa657">Anomaly Detection</text>
  <text x="480" y="930" text-anchor="middle" font-size="10" fill="#8b949e">IsolationForest · anomaly_model.pkl</text>

  <rect x="610" y="890" width="160" height="54" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="690" y="912" text-anchor="middle" font-size="11" font-weight="bold" fill="#388bfd">OpenAI GPT</text>
  <text x="690" y="930" text-anchor="middle" font-size="10" fill="#8b949e">gpt-3.5-turbo · LLM Synthesis</text>

  <!-- ── ENV VARS LEGEND ── -->
  <rect x="30" y="970" width="840" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="992" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Environment Variables (Azure App Service)</text>
  <text x="120" y="1014" text-anchor="middle" font-size="10" fill="#3fb950">AZURE_STORAGE_CONNECTION_STRING</text>
  <text x="120" y="1030" text-anchor="middle" font-size="10" fill="#8b949e">Blob Storage auth</text>
  <text x="320" y="1014" text-anchor="middle" font-size="10" fill="#3fb950">AZURE_BLOB_CONTAINER</text>
  <text x="320" y="1030" text-anchor="middle" font-size="10" fill="#8b949e">knowledge-base</text>
  <text x="510" y="1014" text-anchor="middle" font-size="10" fill="#3fb950">DATABASE_URL</text>
  <text x="510" y="1030" text-anchor="middle" font-size="10" fill="#8b949e">PostgreSQL connection</text>
  <text x="700" y="1014" text-anchor="middle" font-size="10" fill="#3fb950">OPENAI_API_KEY</text>
  <text x="700" y="1030" text-anchor="middle" font-size="10" fill="#8b949e">LLM synthesis</text>
  <text x="450" y="1056" text-anchor="middle" font-size="10" fill="#6e7681">Left Shift Program 2026 – Data &amp; AI (T5) · Smart Retail Assistant</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
    </marker>
  </defs>

</svg>
