name: CI/CD — Smart Retail Assistant

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────
# Environment
# ─────────────────────────────────────────────────────────────
env:
  DOCKER_HUB_USERNAME: bytesaint03
  BACKEND_IMAGE:       bytesaint03/smart-retail-assistant-backend
  FRONTEND_IMAGE:      bytesaint03/smart-retail-assistant-frontend
  AZURE_APP_NAME:      smart-assistant-api
  AZURE_APP_URL:       https://smart-assistant-api-abefc8fwbearcncb.southeastasia-01.azurewebsites.net

# ─────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1 — Backend Tests
  # ───────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=dGVzdA==;EndpointSuffix=core.windows.net
          AZURE_BLOB_CONTAINER: knowledge-base
          OPENAI_API_KEY: sk-test-key
        run: python -m pytest tests/ -v --tb=short -q

  # ───────────────────────────────────────────────────────────
  # JOB 2 — Frontend Build Check
  # ───────────────────────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        env:
          REACT_APP_API_URL: ${{ env.AZURE_APP_URL }}
          CI: false
        run: npm run build

  # ───────────────────────────────────────────────────────────
  # JOB 3 — Build & Push Docker Images
  # Only on push to main
  # ───────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            REACT_APP_API_URL=${{ env.AZURE_APP_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ───────────────────────────────────────────────────────────
  # JOB 4 — Deploy to Azure App Service
  # Uses publish profile — no service principal needed
  # ───────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy backend container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name:       ${{ env.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images:         ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Wait for container to start
        run: sleep 40

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.AZURE_APP_URL }}/health)
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — status $STATUS"
            exit 1
          fi
          echo "✅ Deployment successful — API is healthy"
