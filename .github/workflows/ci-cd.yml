name: CI/CD — Smart Retail Assistant

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────
# Environment
# ─────────────────────────────────────────────────────────────
env:
  DOCKER_HUB_USERNAME: bytesaint03
  BACKEND_IMAGE:       bytesaint03/smart-retail-assistant-backend
  FRONTEND_IMAGE:      bytesaint03/smart-retail-assistant-frontend
  AZURE_APP_NAME:      smart-assistant-api
  AZURE_APP_URL:       https://smart-assistant-api-abefc8fwbearcncb.southeastasia-01.azurewebsites.net

# ─────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1 — Backend Tests
  # ───────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=dGVzdA==;EndpointSuffix=core.windows.net
          AZURE_BLOB_CONTAINER: knowledge-base
          OPENAI_API_KEY: sk-test-key
        run: python -m pytest tests/ -v --tb=short -q

  # ───────────────────────────────────────────────────────────
  # JOB 2 — Frontend Build Check
  # ───────────────────────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        env:
          REACT_APP_API_URL: ${{ env.AZURE_APP_URL }}
          CI: false
        run: npm run build

  # ───────────────────────────────────────────────────────────
  # JOB 3 — Build & Push Docker Images
  # Only on push to main
  # ───────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            REACT_APP_API_URL=${{ env.AZURE_APP_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ───────────────────────────────────────────────────────────
  # JOB 4 — Deploy to Azure App Service
  # Uses Azure CLI with publish profile credentials
  # (azure/webapps-deploy@v3 does not support container image
  #  updates via publish profile — CLI is the correct approach)
  # ───────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Extract publish profile credentials
        id: creds
        run: |
          # Parse userName and userPWD from the publish profile XML
          PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
          USERNAME=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          SCMURL=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1)
          echo "scm_url=$SCMURL" >> $GITHUB_OUTPUT
          echo "::add-mask::$PASSWORD"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Update container image via Kudu REST API
        run: |
          NEW_IMAGE="${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          SCM_URL="https://${{ steps.creds.outputs.scm_url }}"
          echo "Updating container image to: $NEW_IMAGE"

          # Use Kudu API to update the container settings
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$SCM_URL/api/settings" \
            -u "${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.password }}" \
            -H "Content-Type: application/json" \
            -d "{\"DOCKER_CUSTOM_IMAGE_NAME\": \"$NEW_IMAGE\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Kudu API response code: $HTTP_CODE"

          if [ "$HTTP_CODE" != "204" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Kudu settings update returned $HTTP_CODE — attempting restart"
          fi

          # Restart the app to pull the new image
          RESTART=$(curl -s -w "\n%{http_code}" -X POST \
            "$SCM_URL/api/restart" \
            -u "${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.password }}")

          RESTART_CODE=$(echo "$RESTART" | tail -1)
          echo "Restart response code: $RESTART_CODE"

      - name: Wait for container to start
        run: |
          echo "Waiting 60s for new container to start..."
          sleep 60

      - name: Health check
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.AZURE_APP_URL }}/health)
            echo "Attempt $i — Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment successful — API is healthy"
              exit 0
            fi
            sleep 20
          done
          echo "❌ Health check failed after 3 attempts"
          exit 1
