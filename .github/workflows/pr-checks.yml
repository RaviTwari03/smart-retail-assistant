name: PR Checks

# Runs on every pull request — tests only, no build/deploy
on:
  pull_request:
    branches: [main]

jobs:

  lint-and-test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=dGVzdA==;EndpointSuffix=core.windows.net
          AZURE_BLOB_CONTAINER: knowledge-base
          OPENAI_API_KEY: sk-test-key
        run: python -m pytest tests/ -v --tb=short

      # ── Node ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend build check
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://smart-assistant-api-abefc8fwbearcncb.southeastasia-01.azurewebsites.net
          CI: false
        run: npm run build
